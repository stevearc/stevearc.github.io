<div class="video-thumbnail">
  <a ng-click="showVideo()" href="">
    <img class="img-responsive" alt="" ng-src="{{ video.image }}" draggable="false">
  </a>
  <div class="well well-sm">
    <h3>{{ video.title }}</h3>
    <div class="description">
      {{ video.description }}
    </div>
  </div>
</div>
